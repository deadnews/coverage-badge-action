name: Coverage Badge
description: Push a coverage badge to an orphan branch or gist

inputs:
  file:
    description: Path to coverage file
    required: true
  type:
    description: Coverage format (go, lcov)
    required: true
  branch:
    description: Orphan branch name
    default: badges
  gist-id:
    description: Gist ID (enables gist mode)
  gist-token:
    description: PAT with gist scope

runs:
  using: composite
  steps:
    - name: Parse coverage
      id: coverage
      shell: bash
      env:
        FILE: ${{ inputs.file }}
        TYPE: ${{ inputs.type }}
      run: |
        if [[ ! -f "${FILE}" ]]; then
          echo "::error::Coverage file not found: ${FILE}"
          exit 1
        fi

        case "${TYPE}" in
          go)
            pct=$(awk 'NR>1{s+=$2; if($3>0) c+=$2} END{printf "%.1f", c/s*100}' "${FILE}")
            ;;
          lcov)
            pct=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{printf "%.1f", lh/lf*100}' "${FILE}")
            ;;
          *)
            echo "::error::Unknown coverage type: ${TYPE}. Use 'go' or 'lcov'."
            exit 1
            ;;
        esac

        int=${pct%.*}
        if (( int >= 80 )); then color="brightgreen"
        elif (( int >= 70 )); then color="green"
        elif (( int >= 60 )); then color="yellowgreen"
        elif (( int >= 50 )); then color="yellow"
        elif (( int >= 40 )); then color="orange"
        else color="red"
        fi

        badge=$(printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}' "${pct}" "${color}")

        echo "badge=${badge}" >> "${GITHUB_OUTPUT}"

    - name: Upload badge to orphan branch
      if: ${{ !inputs.gist-id }}
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        BADGE: ${{ steps.coverage.outputs.badge }}
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"

        git fetch origin "${BRANCH}" 2>/dev/null || true
        git checkout -f -B "${BRANCH}" "origin/${BRANCH}" 2>/dev/null || git switch --orphan "${BRANCH}"

        printf '%s' "${BADGE}" > coverage.json

        git add coverage.json
        git diff --staged --quiet || git commit -m "chore: update coverage badge"
        git push origin "${BRANCH}"

    - name: Upload badge to gist
      if: ${{ inputs.gist-id }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gist-token }}
        GIST_ID: ${{ inputs.gist-id }}
        BADGE: ${{ steps.coverage.outputs.badge }}
      run: |
        if [[ -z "${GH_TOKEN}" ]]; then
          echo "::error::gist-token is required when gist-id is set"
          exit 1
        fi

        REPO="${GITHUB_REPOSITORY#*/}"

        gh api --method PATCH "/gists/${GIST_ID}" \
          -f "files[${REPO}-coverage.json][content]=${BADGE}"
